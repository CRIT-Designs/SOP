name: Run Python Script

on:
  push:
    branches:
      - main

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Run script
      run: python first_script.py

    - name: Run script
      run: |
        echo "Starting automation..."
        python first_script.py
        echo "Pipeline complete."